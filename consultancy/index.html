<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://mainstack.com/custom-order">
    <meta name="robots" content="noindex">
    <title>Redirecting..</title>
    <script>
        function redirect() {
            window.location.href = "https://mainstack.com/custom-order";
        }

        redirect();
    </script>
</head>

<body onload="redirect()">
    <p><a href="https://mainstack.com/custom-order">Booking Calendar</a></p>
</body>

</html>
