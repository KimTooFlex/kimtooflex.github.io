<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting…</title>
    <script>
        var path = window.location.pathname;

        // map old domain paths to new domain

        var isDocs = path.toLocaleLowerCase.includes("sdk/") || path.toLocaleLowerCase.includes("/sdk");

        if (isDocs) {

            window.location.replace("https://docs.kimtoo.net" + path);
            window.onload = function () {
                document.body.innerText = "Redirecting…";
            }
        }

    </script>
</head>
<body>
   
</body>
</html>
